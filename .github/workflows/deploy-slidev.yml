name: Deploy Slidev to GitHub Pages

on:
    push:
        branches:
            - main
        paths:
            - "markdownintro/**"
            - ".github/workflows/deploy-slidev.yml"
    workflow_dispatch:

permissions:
    contents: read
    pages: write
    id-token: write

concurrency:
    group: "github-pages"
    cancel-in-progress: false

defaults:
    run:
        working-directory: markdownintro

jobs:
    build:
        runs-on: ubuntu-latest

        steps:
            - name: Checkout repository
              uses: actions/checkout@v5

            - name: Setup pnpm
              uses: pnpm/action-setup@v4
              with:
                  version: 10

            - name: Setup Node.js
              uses: actions/setup-node@v5
              with:
                  node-version: 22
                  cache: pnpm
                  cache-dependency-path: markdownintro/pnpm-lock.yaml

            - name: Install dependencies
              run: pnpm install --frozen-lockfile

            - name: Build Slidev
              run: pnpm exec slidev build --base /

            - name: Disable Jekyll
              run: touch dist/.nojekyll

            - name: Upload GitHub Pages artifact
              uses: actions/upload-pages-artifact@v4
              with:
                  path: markdownintro/dist

    deploy:
        runs-on: ubuntu-latest
        needs: build

        environment:
            name: github-pages
            url: ${{ steps.deployment.outputs.page_url }}

        steps:
            - name: Deploy to GitHub Pages
              id: deployment
              uses: actions/deploy-pages@v4
